services:
  app:
    command: python -m cProfile -o /profile/results/app.prof app.py
    environment:
      PROFILING_ENABLED: "true"
    volumes:
      - ./profile/results:/profile/results
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  worker:
    environment:
      PROFILING_ENABLED: "true"
    volumes:
      - ./profile/results:/profile/results

  profiler:
    build:
      context: .
      dockerfile: profile/Dockerfile.profiler
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./profile/results:/profile/results
      - ./perf/fixtures:/fixtures:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_URL: http://app:8080
      RESULTS_DIR: /profile/results
