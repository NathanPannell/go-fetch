services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongodb/mongodb-atlas-local
    volumes:
      - mongo_data:/data/db
      - mongo_configdb:/data/configdb
      - mongo_mongot:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  embedder:
    build:
      context: .
      dockerfile: embedder/Dockerfile
    environment:
      EMBED_SEARCH_WORKERS: 2
      EMBED_INDEX_WORKERS: 2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  app:
    build: .
    environment:
      MONGO_URI: mongodb://mongo:27017/flaskdb
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      EMBEDDER_URL: http://embedder:8001
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      embedder:
        condition: service_healthy
    deploy:
      replicas: 1

  worker:
    build: .
    command: celery -A tasks.app worker --loglevel=info --concurrency=2 --prefetch-multiplier=1 --pool=prefork
    environment:
      MONGO_URI: mongodb://mongo:27017/flaskdb
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      EMBEDDER_URL: http://embedder:8001
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      embedder:
        condition: service_healthy
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  minio_data:
  mongo_data:
  mongo_configdb:
  mongo_mongot:
