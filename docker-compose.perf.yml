services:
  app:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  perf:
    build:
      context: .
      dockerfile: perf/Dockerfile.perf
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./perf/results:/perf/results
      - ./perf/fixtures:/fixtures:ro
    environment:
      APP_URL: http://app:8080
      RESULTS_DIR: /perf/results
      PERF_SCENARIO: ${PERF_SCENARIO:-baseline}
